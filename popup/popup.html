<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visible Autofill</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --panel: #ffffff;
        --text: #17212f;
        --muted: #5f6b7a;
        --accent: #0d6e6e;
        --accent-hover: #0a5a5a;
        --border: #dce3ea;
      }

      body {
        margin: 0;
        width: 320px;
        min-height: 190px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #ffffff 0%, var(--bg) 65%);
      }

      .card {
        padding: 14px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: 0.2px;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      button {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(180deg, var(--accent), #0a6464);
        cursor: pointer;
      }

      button:hover {
        background: linear-gradient(180deg, var(--accent-hover), #084b4b);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .status {
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 8px 10px;
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }

      .shortcut {
        margin-top: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .section {
        margin-top: 12px;
        border-top: 1px dashed var(--border);
        padding-top: 10px;
      }

      .section h2 {
        margin: 0 0 8px;
        font-size: 12px;
        color: #1f2f43;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .row {
        margin-bottom: 8px;
      }

      .row label {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        color: #2f3f54;
      }

      textarea,
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font-size: 12px;
        padding: 7px 8px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      textarea {
        resize: vertical;
        min-height: 58px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }

      .actions button {
        width: auto;
        flex: 1;
        font-size: 12px;
        padding: 8px 9px;
      }

      .ghost {
        color: var(--text);
        background: #ffffff;
        border-color: var(--border);
      }

      .ghost:hover {
        background: #f0f4f8;
      }

      kbd {
        border: 1px solid var(--border);
        border-bottom-width: 2px;
        border-radius: 5px;
        padding: 1px 4px;
        background: #ffffff;
        font-family: inherit;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Visible Form Autofill</h1>
      <p>Fills only visible, in-viewport, interactable fields.</p>
      <button id="runAutofill" type="button">Autofill Active Page</button>
      <div class="status" id="status" role="status" aria-live="polite">Ready</div>
      <div class="shortcut">Shortcut: <kbd>Alt</kbd> + <kbd>F</kbd></div>

      <section class="section">
        <h2>Dataset Editor</h2>

        <div class="row">
          <label for="namesInput">Names (one per line)</label>
          <textarea id="namesInput"></textarea>
        </div>

        <div class="row">
          <label for="emailsInput">Emails (one per line)</label>
          <textarea id="emailsInput"></textarea>
        </div>

        <div class="row">
          <label for="phonesInput">Phones (one per line)</label>
          <textarea id="phonesInput"></textarea>
        </div>

        <div class="row">
          <label for="addressesInput">Addresses (one per line)</label>
          <textarea id="addressesInput"></textarea>
        </div>

        <div class="row">
          <label for="companiesInput">Companies (one per line)</label>
          <textarea id="companiesInput"></textarea>
        </div>

        <div class="row">
          <label for="urlsInput">URLs (one per line)</label>
          <textarea id="urlsInput"></textarea>
        </div>

        <div class="row">
          <label for="paragraphInput">Paragraph source</label>
          <textarea id="paragraphInput"></textarea>
        </div>

        <div class="row">
          <label for="minWordsInput">Min words</label>
          <input id="minWordsInput" type="number" min="3" max="200" />
        </div>

        <div class="row">
          <label for="maxWordsInput">Max words</label>
          <input id="maxWordsInput" type="number" min="3" max="200" />
        </div>

        <div class="actions">
          <button id="saveDataset" type="button">Save Dataset</button>
          <button id="restoreDefaults" type="button" class="ghost">Restore Defaults</button>
        </div>
      </section>
    </main>
    <script src="../data/dataset-manager.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
